<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pace Clock</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0a1628;
      overflow: hidden;
    }

    body {
      display: -ms-flexbox;
      display: flex;
      -ms-flex-direction: column;
      flex-direction: column;
      -ms-flex-align: center;
      align-items: center;
      -ms-flex-pack: start;
      justify-content: flex-start;
    }

    #clock-face-area {
      position: relative;
      width: 100%;
      max-width: 100vw;
      max-height: 100%;
    }

    #clock-face-area canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #digital-clock {
      display: -ms-flexbox;
      display: flex;
      width: 100%;
      color: #c0c8d0;
      font-family: monospace;
    }

    #club-logo,
    #council-logo {
      position: absolute;
      z-index: 10;
      opacity: 0.9;
    }

    #club-logo { top: 0; left: 0; }
    #council-logo { top: 0; right: 0; }
  </style>
</head>

<body>

  <!-- Your SVG content remains exactly the same -->
  <!-- (SVG is fully ES5 compatible as-is) -->

  <svg id="club-logo" xmlns="http://www.w3.org/2000/svg">
    <!-- SVG content unchanged -->
  </svg>

  <svg id="council-logo" xmlns="http://www.w3.org/2000/svg">
    <!-- SVG content unchanged -->
  </svg>

  <div id="clock-face-area">
    <canvas id="clockCanvas"></canvas>
  </div>

  <div id="digital-clock">
    <div id="time-display"></div>
    <div id="ampm-display"></div>
  </div>

  <!-- ES5 Script -->
  <script>
    (function () {

      function pad(num) {
        return num < 10 ? "0" + num : num;
      }

      function updateClock() {
        var now = new Date();
        var hours = now.getHours();
        var minutes = now.getMinutes();
        var seconds = now.getSeconds();
        var ampm = hours >= 12 ? "PM" : "AM";

        hours = hours % 12;
        hours = hours ? hours : 12;

        var timeString = pad(hours) + ":" + pad(minutes) + ":" + pad(seconds);

        document.getElementById("time-display").innerHTML = timeString;
        document.getElementById("ampm-display").innerHTML = ampm;
      }

      function init() {
        updateClock();
        setInterval(updateClock, 1000);
      }

      if (document.readyState === "complete" || document.readyState === "interactive") {
        init();
      } else {
        document.addEventListener("DOMContentLoaded", init);
      }

    })();
  </script>

</body>
</html>
