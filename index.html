<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pace Clock</title>

<style>
html, body {
  margin:0;
  padding:0;
  background:#0a1628;
  overflow:hidden;
  width:100%;
  height:100%;
}

#c{
  position:absolute;
  left:0;
  top:0;
  width:100vw;
  height:100vh;
}

#digital{
  position:absolute;
  bottom:2vh;
  width:100%;
  text-align:center;
  font-family:monospace;
  font-weight:bold;
  color:#00d4e5;
  font-size:13vh; /* ~80% of previous */
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div id="digital"></div>

<script>
(function(){

var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var digital=document.getElementById('digital');

var cssW=0, cssH=0, dpr=1;

function resize(force){

  var w=document.documentElement.clientWidth||window.innerWidth;
  var h=document.documentElement.clientHeight||window.innerHeight;
  var ndpr=window.devicePixelRatio||1;

  if(!w||!h) return false;
  if(!force && w===cssW && h===cssH && ndpr===dpr) return true;

  cssW=w;
  cssH=h;
  dpr=ndpr;

  canvas.style.width=cssW+'px';
  canvas.style.height=cssH+'px';

  canvas.width=Math.floor(cssW*dpr);
  canvas.height=Math.floor(cssH*dpr);

  ctx.setTransform(dpr,0,0,dpr,0,0);

  return true;
}

function drawHand(cx,cy,angle,len,width,color){

  ctx.strokeStyle=color;
  ctx.lineWidth=width;
  ctx.lineCap="round";

  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.lineTo(
    cx+Math.cos(angle)*len,
    cy+Math.sin(angle)*len
  );
  ctx.stroke();
}

function pad(n){
  return (n<10?'0':'')+n;
}

function draw(now){

  if(!resize(false)) return;

  var w=cssW;
  var h=cssH;

  var digitalSpace=h*0.28;

  var r=Math.min(w,h-digitalSpace)*0.45;

  var cx=w/2;
  var cy=(h-digitalSpace)/2;

  ctx.clearRect(0,0,w,h);

  ctx.fillStyle='#F0F3F5';
  ctx.beginPath();
  ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fill();

  ctx.strokeStyle='#222';
  ctx.lineWidth=r*0.03;
  ctx.beginPath();
  ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.stroke();

  for(var i=0;i<60;i++){

    var a=(i/60)*Math.PI*2-Math.PI/2;
    var cosA=Math.cos(a);
    var sinA=Math.sin(a);

    if(i%5===0){

      var inner=r*0.82;
      var outer=r*0.98;

      ctx.strokeStyle='#222';
      ctx.lineWidth=r*0.02;

      ctx.beginPath();
      ctx.moveTo(cx+cosA*inner,cy+sinA*inner);
      ctx.lineTo(cx+cosA*outer,cy+sinA*outer);
      ctx.stroke();

    }else{

      var inner2=r*0.90;
      var outer2=r*0.98;

      ctx.strokeStyle='#888';
      ctx.lineWidth=r*0.008;

      ctx.beginPath();
      ctx.moveTo(cx+cosA*inner2,cy+sinA*inner2);
      ctx.lineTo(cx+cosA*outer2,cy+sinA*outer2);
      ctx.stroke();
    }
  }

  ctx.fillStyle='#222';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.font=Math.floor(r*0.18)+'px monospace';

  for(var n=1;n<=12;n++){

    var sec=n*5;
    var a2=(sec/60)*Math.PI*2-Math.PI/2;
    var rr=r*0.68;

    ctx.fillText(
      String(sec),
      cx+Math.cos(a2)*rr,
      cy+Math.sin(a2)*rr
    );
  }

  var seconds=(now.getTime()/1000)%60;

  var base=(seconds/60)*Math.PI*2-Math.PI/2;

  var handLen=r*0.92;
  var width=r*0.055;

  drawHand(cx,cy,base,handLen,width,'#E53935');
  drawHand(cx,cy,base+Math.PI/2,handLen,width,'#43A047');
  drawHand(cx,cy,base+Math.PI,handLen,width,'#1E88E5');
  drawHand(cx,cy,base+3*Math.PI/2,handLen,width,'#FFD600');

  ctx.fillStyle='#00d4e5';
  ctx.beginPath();
  ctx.arc(cx,cy,r*0.05,0,Math.PI*2);
  ctx.fill();

  /* digital clock */

  var hours=now.getHours();
  var minutes=now.getMinutes();
  var secs=now.getSeconds();

  var ampm=hours>=12?"PM":"AM";
  hours=hours%12;
  if(hours===0) hours=12;

  digital.textContent=
    hours+":"+pad(minutes)+":"+pad(secs)+" "+ampm;
}

function loop(){

  var now=new Date();
  draw(now);

  requestAnimationFrame(loop);
}

window.addEventListener('resize',function(){resize(true);});

setTimeout(function(){resize(true);},0);
setTimeout(function(){resize(true);},200);
setTimeout(function(){resize(true);},1000);

requestAnimationFrame(loop);

})();
</script>

</body>
</html>
