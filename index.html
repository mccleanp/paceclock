<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Pace Clock - Simple Face</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0a1628;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }
    #c {
      position: absolute;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>
  <canvas id="c"></canvas>

  <script>
  (function () {
    var canvas = document.getElementById('c');
    var ctx = canvas.getContext('2d');

    var cssW = 0, cssH = 0, dpr = 1;

    function resize(force) {
      var w = document.documentElement.clientWidth || window.innerWidth || 0;
      var h = document.documentElement.clientHeight || window.innerHeight || 0;
      var ndpr = window.devicePixelRatio || 1;

      if (!w || !h) return false;
      if (!force && w === cssW && h === cssH && ndpr === dpr) return true;

      cssW = w; cssH = h; dpr = ndpr;

      canvas.style.width = cssW + 'px';
      canvas.style.height = cssH + 'px';
      canvas.width = Math.floor(cssW * dpr);
      canvas.height = Math.floor(cssH * dpr);

      // draw in CSS pixels
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return true;
    }

    function drawFace() {
      // Ensure we have a good size
      if (!resize(false)) return;

      var w = cssW, h = cssH;
      var r = Math.min(w, h) * 0.45;
      var cx = w / 2;
      var cy = h / 2;

      // background
      ctx.clearRect(0, 0, w, h);

      // face
      ctx.fillStyle = '#F0F3F5';
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();

      // outer ring
      ctx.strokeStyle = '#222';
      ctx.lineWidth = r * 0.03;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.stroke();

      // ticks
      for (var i = 0; i < 60; i++) {
        var a = (i / 60) * Math.PI * 2 - Math.PI / 2;
        var cosA = Math.cos(a), sinA = Math.sin(a);

        if (i % 5 === 0) {
          // major tick (thicker)
          var inner = r * 0.82;
          var outer = r * 0.98;

          ctx.strokeStyle = '#222';
          ctx.lineWidth = r * 0.02;
          ctx.beginPath();
          ctx.moveTo(cx + cosA * inner, cy + sinA * inner);
          ctx.lineTo(cx + cosA * outer, cy + sinA * outer);
          ctx.stroke();
        } else {
          // minor tick
          var inner2 = r * 0.90;
          var outer2 = r * 0.98;

          ctx.strokeStyle = '#888';
          ctx.lineWidth = r * 0.008;
          ctx.beginPath();
          ctx.moveTo(cx + cosA * inner2, cy + sinA * inner2);
          ctx.lineTo(cx + cosA * outer2, cy + sinA * outer2);
          ctx.stroke();
        }
      }

      // labels: 5,10,...,60
      ctx.fillStyle = '#222';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = Math.floor(r * 0.18) + 'px monospace';

      for (var n = 1; n <= 12; n++) {
        var sec = n * 5;
        var a2 = (sec / 60) * Math.PI * 2 - Math.PI / 2;
        var rr = r * 0.68;
        ctx.fillText(String(sec), cx + Math.cos(a2) * rr, cy + Math.sin(a2) * rr);
      }

      // center dot
      ctx.fillStyle = '#00d4e5';
      ctx.beginPath();
      ctx.arc(cx, cy, r * 0.05, 0, Math.PI * 2);
      ctx.fill();
    }

    function loop() {
      // redraw face occasionally in case layout changes (cheap + robust)
      drawFace();
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', function () { resize(true); });

    // Embedded browsers often need delayed resize calls
    setTimeout(function () { resize(true); }, 0);
    setTimeout(function () { resize(true); }, 200);
    setTimeout(function () { resize(true); }, 1000);

    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
